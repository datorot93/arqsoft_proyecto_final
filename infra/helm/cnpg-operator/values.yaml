# F2 — Helm values para CloudNativePG operator 1.24.
# Despliega en namespace cnpg-system (creado por el chart).
# Documentación: docs/experimento_asr.md §6.4.3

replicaCount: 1

image:
  repository: ghcr.io/cloudnative-pg/cloudnative-pg
  tag: 1.24.1

resources:
  requests:
    cpu: 100m
    memory: 200Mi
  limits:
    cpu: 200m
    memory: 400Mi

# Monitoring se habilita en F3 (cuando kube-prometheus-stack provee la CRD PodMonitor).
# F2 instala el operador SIN observabilidad; F3 lo activa con `helm upgrade`.
monitoring:
  podMonitorEnabled: false
  serviceMonitorEnabled: false

# CRDs — los maneja Helm
crds:
  create: true

# Webhook configuration
webhook:
  enabled: true
  port: 9443

# Tolerar nodos del control-plane si los hay (nuestro kind único nodo)
tolerations:
  - effect: NoSchedule
    key: node-role.kubernetes.io/control-plane
    operator: Exists

# Service account
serviceAccount:
  create: true
  name: cnpg-manager
