---
# acl-deployment.yaml — Anti-Corruption Layer (AdaptadorCore + CircuitBreaker).
# Componente: Integracion.ACL — docs/experimento_asr.md §3.3
apiVersion: apps/v1
kind: Deployment
metadata:
  name: acl
  namespace: {{ .Values.namespaces.acl }}
  labels:
    {{- include "lv-experiment.labels" . | nindent 4 }}
    app.kubernetes.io/name: acl
    app.kubernetes.io/component: AdaptadorCore
spec:
  replicas: {{ .Values.acl.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: acl
  template:
    metadata:
      labels:
        app.kubernetes.io/name: acl
        app.kubernetes.io/component: AdaptadorCore
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- include "lv-experiment.podSecurityContext" . | nindent 8 }}
      containers:
        - name: acl
          image: {{ include "lv-experiment.image" (dict "service" "acl" "root" .) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            {{- range $k, $v := .Values.acl.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            {{- toYaml .Values.acl.resources | nindent 12 }}
