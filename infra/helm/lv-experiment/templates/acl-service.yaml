---
apiVersion: v1
kind: Service
metadata:
  name: acl
  namespace: {{ .Values.namespaces.acl }}
  labels:
    {{- include "lv-experiment.labels" . | nindent 4 }}
    app.kubernetes.io/name: acl
spec:
  type: {{ .Values.acl.service.type }}
  ports:
    - port: {{ .Values.acl.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: acl
