---
apiVersion: v1
kind: Service
metadata:
  name: core-stub
  namespace: {{ .Values.namespaces.coreStub }}
  labels:
    {{- include "lv-experiment.labels" . | nindent 4 }}
    app.kubernetes.io/name: core-stub
spec:
  type: {{ .Values.coreStub.service.type }}
  ports:
    - port: {{ .Values.coreStub.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: core-stub
