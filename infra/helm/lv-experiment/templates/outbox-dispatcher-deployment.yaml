{{/*
outbox-dispatcher-deployment.yaml — 1 Dispatcher por país.
Implementación del patrón Outbox (detalle de implementación, no componente en componentes.jpeg).
*/}}
{{- range .Values.paises }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: outbox-dispatcher-{{ . }}
  namespace: {{ $.Values.namespaces.outboxDispatcher }}
  labels:
    {{- include "lv-experiment.labels" $ | nindent 4 }}
    app.kubernetes.io/name: outbox-dispatcher
    app.kubernetes.io/instance: outbox-dispatcher-{{ . }}
    pais: {{ . }}
spec:
  replicas: {{ $.Values.outboxDispatcher.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: outbox-dispatcher
      app.kubernetes.io/instance: outbox-dispatcher-{{ . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: outbox-dispatcher
        app.kubernetes.io/instance: outbox-dispatcher-{{ . }}
        pais: {{ . }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      {{- with $.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- include "lv-experiment.podSecurityContext" $ | nindent 8 }}
      containers:
        - name: outbox-dispatcher
          image: {{ include "lv-experiment.image" (dict "service" "outbox-dispatcher" "root" $) }}
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: LV_PAIS
              value: {{ . | quote }}
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-{{ . }}-app
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-{{ . }}-app
                  key: password
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-{{ . }}-app
                  key: uri
          resources:
            {{- toYaml $.Values.outboxDispatcher.resources | nindent 12 }}
{{- end }}
