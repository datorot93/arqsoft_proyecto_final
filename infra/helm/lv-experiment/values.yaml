# values.yaml — Defaults del chart lv-experiment.
# Referencia: docs/experimento_asr.md §6.4, versions.env
# Para kind local: helm install ... -f values-local.yaml
# Para OKE: helm install ... -f values-oci.yaml

# ── Registry ───────────────────────────────────────────────────────────────────
image:
  registry: "kind-registry:5000"
  organization: "linea-verde"
  tag: "latest"
  pullPolicy: IfNotPresent

# ── Países (genera 1 Deployment + 1 Service por entrada) ─────────────────────
paises:
  - pe
  - mx
  - co

# ── cdt-pais ─────────────────────────────────────────────────────────────────
cdtPais:
  replicaCount: 2
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 20
    targetCPUUtilizationPercentage: 60
  service:
    type: ClusterIP
    port: 8080
  env:
    PHASE: baseline
    HISTOGRAM_BUCKETS_PATH: /etc/histogram-buckets/buckets_seconds.json

# ── acl ────────────────────────────────────────────────────────────────────────
acl:
  replicaCount: 1
  resources:
    requests:
      cpu: "150m"
      memory: "384Mi"
    limits:
      cpu: "500m"
      memory: "768Mi"
  service:
    type: ClusterIP
    port: 8080
  env:
    CB_FAILURE_RATE_THRESHOLD: "50"
    CB_WAIT_DURATION_IN_OPEN_STATE_SECONDS: "30"
    CB_SLOW_CALL_DURATION_THRESHOLD_MS: "800"

# ── outbox-dispatcher ─────────────────────────────────────────────────────────
outboxDispatcher:
  replicaCount: 1
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "300m"
      memory: "512Mi"

# ── core-stub ─────────────────────────────────────────────────────────────────
coreStub:
  replicaCount: 1
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "300m"
      memory: "512Mi"
  service:
    type: ClusterIP
    port: 8080
  env:
    CORE_STUB_ERROR_RATE: "0.02"
    CORE_STUB_LATENCY_P50_MS: "150"
    CORE_STUB_LATENCY_P99_MS: "600"

# ── Namespaces ───────────────────────────────────────────────────────────────
namespaces:
  cdtPais: linea-verde
  acl: acl
  outboxDispatcher: linea-verde
  coreStub: core-stub

# ── Observabilidad ───────────────────────────────────────────────────────────
monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 15s
    path: /actuator/prometheus

# ── Seguridad ────────────────────────────────────────────────────────────────
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

# ── Pull secrets (solo OCI) ──────────────────────────────────────────────────
imagePullSecrets: []
