# F1 — Helm values para metrics-server v0.7.2 (chart 3.12.2) en kind.
# Bandera --kubelet-insecure-tls necesaria porque kind usa certs auto-firmados.
# Documentación: docs/experimento_asr.md §6.2.1, §6.4.10

args:
  - --kubelet-insecure-tls
  - --kubelet-preferred-address-types=InternalIP,Hostname
  - --metric-resolution=15s

resources:
  requests:
    cpu: 100m
    memory: 200Mi
  limits:
    cpu: 200m
    memory: 400Mi

# Probes liberales: en kind con bajos recursos puede tardar en reportar
livenessProbe:
  initialDelaySeconds: 60
readinessProbe:
  initialDelaySeconds: 60

# Asegurar que metrics-server no quede en el control-plane
nodeSelector:
  node-role.kubernetes.io/control-plane: ""
tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule

# Service como ClusterIP (no expongas a fuera del cluster)
service:
  type: ClusterIP
