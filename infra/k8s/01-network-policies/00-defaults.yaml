# =================================================================
# ALLOW-APISERVER-EGRESS — pods de cada namespace pueden alcanzar el API server.
# kindnet evalúa NetworkPolicies DESPUÉS del DNAT de kube-proxy: el paquete a
# 10.96.0.1:443 ya fue reescrito a <nodo-control-plane>:6443 cuando la NP lo ve.
# Por eso se usa el rango de la red Docker de kind (172.18.0.0/16) y puerto 6443.
# En OKE (Calico/VCN-native, evaluación pre-DNAT) se usaría 10.96.0.1/32:443.
# =================================================================
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: allow-apiserver-egress, namespace: datos }
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to: [{ ipBlock: { cidr: 172.18.0.0/16 } }]
      ports: [{ protocol: TCP, port: 6443 }]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: allow-apiserver-egress, namespace: asincrono }
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to: [{ ipBlock: { cidr: 172.18.0.0/16 } }]
      ports: [{ protocol: TCP, port: 6443 }]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: allow-apiserver-egress, namespace: linea-verde }
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to: [{ ipBlock: { cidr: 172.18.0.0/16 } }]
      ports: [{ protocol: TCP, port: 6443 }]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: allow-apiserver-egress, namespace: borde }
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to: [{ ipBlock: { cidr: 172.18.0.0/16 } }]
      ports: [{ protocol: TCP, port: 6443 }]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: allow-apiserver-egress, namespace: acl }
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to: [{ ipBlock: { cidr: 172.18.0.0/16 } }]
      ports: [{ protocol: TCP, port: 6443 }]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: allow-apiserver-egress, namespace: core-stub }
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to: [{ ipBlock: { cidr: 172.18.0.0/16 } }]
      ports: [{ protocol: TCP, port: 6443 }]
---
apiVersion: networking.k8s.io/v1
