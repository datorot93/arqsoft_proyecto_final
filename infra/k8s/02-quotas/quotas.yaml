# =================================================================
# observabilidad — Prometheus + Grafana + Tempo + Loki + OTel
# Es el namespace más demandante.
# Multi-nodo (4 nodes): OTel Collector DaemonSet 4×(500m CPU, 512Mi)
# = +2 CPU, +2Gi límite extra vs cluster de 1 nodo.
# =================================================================
---
apiVersion: v1
kind: ResourceQuota
metadata: { name: quota, namespace: observabilidad }
spec:
  hard:
    requests.cpu: "5"
    requests.memory: "8Gi"
    limits.cpu: "12"
    limits.memory: "16Gi"
    pods: "30"
    persistentvolumeclaims: "10"
---
apiVersion: v1
kind: LimitRange
metadata: { name: defaults, namespace: observabilidad }
spec:
  limits:
    - type: Container
      default: { cpu: "300m", memory: "512Mi" }
      defaultRequest: { cpu: "100m", memory: "256Mi" }

