# F1 — ResourceQuotas y LimitRanges por namespace.
# Objetivo: que un componente no acapare el cluster local y enmascare la saturación de su par.
# Calibrado para host con 16 GB RAM / 8 vCPU.
# Documentación: docs/experimento_asr.md §6.2.3

# =================================================================
# borde — Kong (1 réplica). Liviano.
# =================================================================
---
apiVersion: v1
kind: ResourceQuota
metadata: { name: quota, namespace: borde }
spec:
  hard:
    requests.cpu: "1"
    requests.memory: "2Gi"
    limits.cpu: "2"
    limits.memory: "4Gi"
    pods: "10"
---
apiVersion: v1
kind: LimitRange
metadata: { name: defaults, namespace: borde }
spec:
  limits:
    - type: Container
      default: { cpu: "200m", memory: "256Mi" }
      defaultRequest: { cpu: "100m", memory: "128Mi" }

# =================================================================
# linea-verde — CDTXPais x 3 países, HPA 2..20 cada uno.
# Pico teórico de 60 pods (3 x 20). Resource quota debe permitir el pico.
# =================================================================
---
apiVersion: v1
kind: ResourceQuota
metadata: { name: quota, namespace: linea-verde }
spec:
  hard:
    requests.cpu: "4"
    requests.memory: "8Gi"
    limits.cpu: "8"
    limits.memory: "12Gi"
    pods: "70"
---
apiVersion: v1
kind: LimitRange
metadata: { name: defaults, namespace: linea-verde }
spec:
  limits:
    - type: Container
      default: { cpu: "300m", memory: "512Mi" }
      defaultRequest: { cpu: "100m", memory: "256Mi" }

# =================================================================
# datos — 3 clusters Postgres, primary + standby cada uno = 6 pods + operador
# =================================================================
---
apiVersion: v1
kind: ResourceQuota
metadata: { name: quota, namespace: datos }
spec:
  hard:
    requests.cpu: "3"
    requests.memory: "6Gi"
    limits.cpu: "6"
    limits.memory: "10Gi"
    pods: "15"
    persistentvolumeclaims: "10"
---
apiVersion: v1
kind: LimitRange
metadata: { name: defaults, namespace: datos }
spec:
  limits:
    - type: Container
      default: { cpu: "500m", memory: "1Gi" }
      defaultRequest: { cpu: "200m", memory: "512Mi" }

