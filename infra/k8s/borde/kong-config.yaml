# F2 — Configuración declarativa de Kong DB-less.
# Define 3 servicios (CDTXPais por país) con rutas y plugins.
# Plugins: rate-limiting (default 60 r/s con burst 50), prometheus, opentelemetry, correlation-id.
# Documentación: docs/experimento_asr.md §6.4.5

apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-declarative-config
  namespace: borde
  labels:
    app.kubernetes.io/part-of: linea-verde-experimento
    componente: ApiGateway
data:
  # Kong busca específicamente kong.yml (con extensión .yml, NO .yaml).
  kong.yml: |
    _format_version: "3.0"
    _transform: true

    # ============================================================
    # Plugins globales (aplicados a todos los servicios)
    # ============================================================
    plugins:
      - name: prometheus
        config:
          per_consumer: false
          status_code_metrics: true
          latency_metrics: true
          bandwidth_metrics: true
          upstream_health_metrics: true
      - name: correlation-id
        config:
          header_name: X-Correlation-Id
          generator: uuid
          echo_downstream: true
      - name: request-size-limiting
        config:
          allowed_payload_size: 8   # KB; ASR-1 espera CDT JSON ~2 KB

    # ============================================================
    # Servicios upstream — uno por país (CDTXPais-XX)
    # ============================================================
    services:
      # ---------------- Perú ----------------
      - name: cdt-pais-pe
        host: cdt-pais-pe.linea-verde.svc.cluster.local
        port: 8080
        protocol: http
        connect_timeout: 2000
        write_timeout: 5000
        read_timeout: 5000
        retries: 0   # no reintentos del gateway; el cliente decide
        routes:
          - name: cdt-pe-route
            paths: ["/v1/cdt"]
            methods: ["POST", "GET"]
            headers:
              x-pais: ["pe"]
            strip_path: false
        plugins:
          - name: rate-limiting
            config:
              second: 60       # 60 req/s default
              minute: 3600
              policy: local    # en local, no Redis. En OCI: redis externo.
              fault_tolerant: true
              hide_client_headers: false

      # ---------------- México ----------------
      - name: cdt-pais-mx
        host: cdt-pais-mx.linea-verde.svc.cluster.local
        port: 8080
        protocol: http
        connect_timeout: 2000
        write_timeout: 5000
        read_timeout: 5000
        retries: 0
        routes:
          - name: cdt-mx-route
            paths: ["/v1/cdt"]
            methods: ["POST", "GET"]
            headers:
              x-pais: ["mx"]
            strip_path: false
        plugins:
          - name: rate-limiting
            config:
              second: 60
              minute: 3600
              policy: local
              fault_tolerant: true

      # ---------------- Colombia ----------------
      - name: cdt-pais-co
        host: cdt-pais-co.linea-verde.svc.cluster.local
        port: 8080
        protocol: http
        connect_timeout: 2000
        write_timeout: 5000
        read_timeout: 5000
        retries: 0
        routes:
          - name: cdt-co-route
            paths: ["/v1/cdt"]
            methods: ["POST", "GET"]
            headers:
              x-pais: ["co"]
            strip_path: false
        plugins:
          - name: rate-limiting
            config:
              second: 60
              minute: 3600
              policy: local
              fault_tolerant: true
