# TestRun CR para el escenario `baseline_asr1` (15 min · 0.2 r/s).
---
apiVersion: k6.io/v1alpha1
kind: TestRun
metadata:
  name: k6-baseline
  namespace: carga
  labels:
    app.kubernetes.io/part-of: linea-verde-experimento
    componente: load-runner
    fase: baseline
spec:
  parallelism: 1
  cleanup: post
  arguments: >-
    --tag testid=baseline
    -o experimental-prometheus-rw
    --no-thresholds
  script:
    configMap:
      name: k6-baseline-script
      file: baseline_asr1.js
  runner:
    image: kind-registry:5000/linea-verde/k6-loader:latest
    imagePullPolicy: IfNotPresent
    serviceAccountName: k6-runner
    env:
      - name: SEED
        value: "42"
      - name: K6_PROMETHEUS_RW_SERVER_URL
        valueFrom:
          configMapKeyRef:
            name: k6-prom-config
            key: K6_PROMETHEUS_RW_SERVER_URL
      - name: K6_PROMETHEUS_RW_PUSH_INTERVAL
        valueFrom:
          configMapKeyRef:
            name: k6-prom-config
            key: K6_PROMETHEUS_RW_PUSH_INTERVAL
      - name: KONG_URL
        valueFrom:
          configMapKeyRef:
            name: k6-prom-config
            key: KONG_URL
      - name: BASELINE_DURATION
        value: "900"
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    securityContext:
      runAsNonRoot: true
      runAsUser: 12345
      seccompProfile:
        type: RuntimeDefault
