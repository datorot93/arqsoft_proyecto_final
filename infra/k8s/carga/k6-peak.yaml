# TestRun CR para el escenario `peak_asr2` (20 min · NHPP+MMPP+Dirichlet).
# Es el escenario CRÍTICO del experimento.
#
# ASR-2: onset a 100 r/s (6.000 CDT/min). preAllocatedVUs=200/maxVUs=400
# para soportar hasta 300 r/s en ráfagas MMPP (100 r/s × 3 bursty multiplier).

---
apiVersion: k6.io/v1alpha1
kind: TestRun
metadata:
  name: k6-peak
  namespace: carga
  labels:
    app.kubernetes.io/part-of: linea-verde-experimento
    componente: load-runner
    fase: peak
spec:
  parallelism: 1
  cleanup: post
  arguments: >-
    --tag testid=peak
    -o experimental-prometheus-rw
    --no-thresholds
  script:
    configMap:
      name: k6-peak-script
      file: peak_asr2.js
  runner:
    image: kind-registry:5000/linea-verde/k6-loader:latest
    imagePullPolicy: IfNotPresent
    serviceAccountName: k6-runner
    env:
      - name: SEED
        value: "42"
      - name: K6_PROMETHEUS_RW_SERVER_URL
        valueFrom:
          configMapKeyRef:
            name: k6-prom-config
            key: K6_PROMETHEUS_RW_SERVER_URL
      - name: K6_PROMETHEUS_RW_PUSH_INTERVAL
        valueFrom:
          configMapKeyRef:
            name: k6-prom-config
            key: K6_PROMETHEUS_RW_PUSH_INTERVAL
      - name: KONG_URL
        valueFrom:
          configMapKeyRef:
            name: k6-prom-config
            key: KONG_URL
      - name: PEAK_VUS
        value: "200"
      - name: PEAK_MAX_VUS
        value: "400"
    resources:
      requests:
        cpu: 800m
        memory: 768Mi
      limits:
        cpu: 2000m
        memory: 1536Mi
    securityContext:
      runAsNonRoot: true
      runAsUser: 12345
      seccompProfile:
        type: RuntimeDefault
