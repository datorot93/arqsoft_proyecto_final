# TestRun CR para el escenario `peak_asr2` (20 min · NHPP+MMPP+Dirichlet).
# Es el escenario CRÍTICO del experimento.
#
# parallelism=1 — un solo pod genera la carga; con la cota de
# preAllocatedVUs=60 / maxVUs=120 cabe en la quota de namespace `carga`
# (limits.cpu=4, limits.memory=4Gi) sin saturar.

---
apiVersion: k6.io/v1alpha1
kind: TestRun
metadata:
  name: k6-peak
  namespace: carga
  labels:
    app.kubernetes.io/part-of: linea-verde-experimento
    componente: load-runner
    fase: peak
spec:
  parallelism: 1
  cleanup: post
  arguments: >-
    --tag testid=peak
    -o experimental-prometheus-rw
    --no-thresholds
  script:
    configMap:
      name: k6-peak-script
      file: peak_asr2.js
  runner:
    image: kind-registry:5000/linea-verde/k6-loader:latest
    imagePullPolicy: IfNotPresent
    serviceAccountName: k6-runner
    env:
      - name: SEED
        value: "42"
      - name: K6_PROMETHEUS_RW_SERVER_URL
        valueFrom:
          configMapKeyRef:
            name: k6-prom-config
            key: K6_PROMETHEUS_RW_SERVER_URL
      - name: K6_PROMETHEUS_RW_PUSH_INTERVAL
        valueFrom:
          configMapKeyRef:
            name: k6-prom-config
            key: K6_PROMETHEUS_RW_PUSH_INTERVAL
      - name: KONG_URL
        valueFrom:
          configMapKeyRef:
            name: k6-prom-config
            key: KONG_URL
      - name: PEAK_VUS
        value: "60"
      - name: PEAK_MAX_VUS
        value: "120"
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: 1500m
        memory: 1Gi
    securityContext:
      runAsNonRoot: true
      runAsUser: 12345
      seccompProfile:
        type: RuntimeDefault
