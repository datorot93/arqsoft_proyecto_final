# TestRun CR para el escenario `warmup` (5 min · 2 r/s).
# k6-operator 0.0.16 lee el CR y lanza N pods con `parallelism`.
# Para warmup mantenemos parallelism=1 (1 pod genera la carga).
#
# La imagen `k6-loader:latest` es nuestro k6 custom (Dockerfile.k6) cargada
# vía `kind load docker-image`.
#
# El CRD v0.0.16 acepta sólo PodSecurityContext (no per-container), por eso
# no incluimos allowPrivilegeEscalation/capabilities/readOnlyRootFilesystem.
# El namespace `carga` está en pod-security baseline, no restricted, así que
# este perfil es aceptable.

---
apiVersion: k6.io/v1alpha1
kind: TestRun
metadata:
  name: k6-warmup
  namespace: carga
  labels:
    app.kubernetes.io/part-of: linea-verde-experimento
    componente: load-runner
    fase: warmup
spec:
  parallelism: 1
  cleanup: post
  arguments: >-
    --tag testid=warmup
    -o experimental-prometheus-rw
    --no-thresholds
  script:
    configMap:
      name: k6-warmup-script
      file: warmup.js
  runner:
    image: kind-registry:5000/linea-verde/k6-loader:latest
    imagePullPolicy: IfNotPresent
    serviceAccountName: k6-runner
    env:
      - name: SEED
        value: "42"
      - name: K6_PROMETHEUS_RW_SERVER_URL
        valueFrom:
          configMapKeyRef:
            name: k6-prom-config
            key: K6_PROMETHEUS_RW_SERVER_URL
      - name: K6_PROMETHEUS_RW_PUSH_INTERVAL
        valueFrom:
          configMapKeyRef:
            name: k6-prom-config
            key: K6_PROMETHEUS_RW_PUSH_INTERVAL
      - name: KONG_URL
        valueFrom:
          configMapKeyRef:
            name: k6-prom-config
            key: KONG_URL
      - name: WARMUP_DURATION
        value: "300"
      - name: WARMUP_RATE
        value: "2"
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    securityContext:
      runAsNonRoot: true
      runAsUser: 12345
      seccompProfile:
        type: RuntimeDefault
