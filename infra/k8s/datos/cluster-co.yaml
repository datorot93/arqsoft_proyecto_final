# F2 — Cluster PostgreSQL para Colombia (AlmacenCDTXPais — instancia CO)
# Componente: AlmacenCDTXPais (Datos) · sufijo XPais por país.

apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-co
  namespace: datos
  labels:
    app.kubernetes.io/part-of: linea-verde-experimento
    componente: AlmacenCDTXPais
    pais: co
spec:
  description: "AlmacenCDTXPais — instancia Colombia"
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgresql:16.4
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"
  storage:
    size: "1Gi"
    storageClass: "standard"
  bootstrap:
    initdb:
      database: linea_verde
      owner: app
      postInitApplicationSQLRefs:
        configMapRefs:
          - name: cdt-bootstrap-sql
            key: 01-init-cdt.sql
          - name: cdt-bootstrap-sql
            key: 02-init-outbox.sql
  inheritedMetadata:
    labels:
      pais: co
      componente: AlmacenCDTXPais
  monitoring:
    enablePodMonitor: false  # F3 lo activa
  logLevel: info
  postgresql:
    parameters:
      log_statement: "ddl"
      log_min_duration_statement: "200"
      max_connections: "100"
