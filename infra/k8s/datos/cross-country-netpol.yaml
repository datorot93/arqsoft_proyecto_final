# =================================================================
# Permitir egreso intra-cluster Postgres (replicación primary↔standby)
# Los pods Postgres dentro del mismo país pueden hablar entre sí.
# =================================================================
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-replication-intra-cluster
  namespace: datos
spec:
  podSelector:
    matchLabels:
      cnpg.io/podRole: instance
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              cnpg.io/podRole: instance
      ports:
        - protocol: TCP
          port: 5432
  egress:
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/podRole: instance
      ports:
        - protocol: TCP
          port: 5432
    - to:
        # Egreso a kube-system para DNS y a cnpg-system para webhooks
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cnpg-system
