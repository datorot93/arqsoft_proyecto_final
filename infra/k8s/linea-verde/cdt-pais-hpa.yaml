# HPA v2 para los 3 deployments de cdt-pais.
# Target: CPU 60%, min 2 réplicas, max 20 réplicas.
# Scale-up rápido (30s stabilization) para absorber picos (ASR-2: 6000 CDT/20min).
# Scale-down conservador (300s) para evitar churn.

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cdt-pais-pe
  namespace: linea-verde
  labels:
    app.kubernetes.io/name: cdt-pais
    app.kubernetes.io/instance: cdt-pais-pe
    pais: pe
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cdt-pais-pe
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 4
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60

