# outbox-dispatcher — 3 deployments, uno por país.
# NOTA ARQUITECTÓNICA: outbox-dispatcher NO es un componente del modelo
# (no aparece en diagramas_final/componentes.jpeg). Es un detalle de implementación
# del patrón Outbox Pattern. El componente en el modelo es CDTXPais (que escribe el outbox)
# y MessageBroker (que recibe los eventos).
# Ver CLAUDE.md §Reglas de diseño #9 y commit message de F4.
#
# 1 réplica por país — FOR UPDATE SKIP LOCKED garantiza seguridad si escala a más.

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: outbox-dispatcher-pe
  namespace: linea-verde
  labels:
    app.kubernetes.io/name: outbox-dispatcher
    app.kubernetes.io/instance: outbox-dispatcher-pe
    app.kubernetes.io/part-of: linea-verde-experimento
    pais: pe
    nota: "implementacion-outbox-pattern-no-componente-modelo"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: outbox-dispatcher-pe
  template:
    metadata:
      labels:
        app.kubernetes.io/name: outbox-dispatcher
        app.kubernetes.io/instance: outbox-dispatcher-pe
        pais: pe
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: outbox-dispatcher
          image: kind-registry:5000/linea-verde/outbox-dispatcher:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: LV_PAIS
              value: "pe"
            - name: PHASE
              value: "baseline"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "redpanda.asincrono.svc.cluster.local:9093"
            - name: HISTOGRAM_BUCKETS_PATH
              value: "/etc/histogram-buckets/buckets_seconds.json"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-pe-app
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-pe-app
                  key: password
          volumeMounts:
            - name: histogram-buckets
              mountPath: /etc/histogram-buckets
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 32Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: histogram-buckets
          configMap:
            name: histogram-buckets

