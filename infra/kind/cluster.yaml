# F1 — Bootstrap del cluster local
# Apoya: ASR-1 (latencia), ASR-2 (escalabilidad) — paridad de API con OKE 1.30
# Topología: 1 control-plane + 3 workers (simulan los 3 ADs de OCI en despliegue.png)
# Documentación: docs/experimento_asr.md §6.2.1

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: linea-verde

networking:
  apiServerAddress: "127.0.0.1"
  apiServerPort: 6443
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/16"
  # kindnet >= 1.0 (incluido en kind v0.23+) soporta NetworkPolicy.
  # NO desactivar el CNI por defecto.

nodes:
  - role: control-plane
    image: kindest/node:v1.30.4
    extraPortMappings:
      # Para Kong Gateway (F2) y dashboards Grafana (F3) accesibles desde el host.
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
            cgroup-driver: "systemd"

  - role: worker
    image: kindest/node:v1.30.4
    labels:
      topology.kubernetes.io/zone: ad-1
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            cgroup-driver: "systemd"

  - role: worker
    image: kindest/node:v1.30.4
    labels:
      topology.kubernetes.io/zone: ad-2
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            cgroup-driver: "systemd"

  - role: worker
    image: kindest/node:v1.30.4
    labels:
      topology.kubernetes.io/zone: ad-3
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            cgroup-driver: "systemd"
